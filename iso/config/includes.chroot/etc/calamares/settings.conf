# Outback OS installer sequence, layered on top of calamares-settings-debian's
# module configs (partition/bootloader/unpackfs/etc). Only the branding and
# the exact module sequence are Outback-specific here.
---
modules-search: [ local ]

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary
- exec:
  - partition
  - mount
  - unpackfs
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - grubcfg
  - bootloader
  - packages
  - umount
- show:
  - finished

branding: outback

prompt-install: false
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true
quit-at-end: false
