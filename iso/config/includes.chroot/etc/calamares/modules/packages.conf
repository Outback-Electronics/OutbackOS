# Strip the installer itself off the target system once install completes,
# so /usr/bin/calamares no longer exists post-install (this is also what
# SystemLauncher::isInstallerAvailable() checks to hide the "Install Outback
# OS" tile once a system is no longer a live session).
---
backend: apt

operations:
  - remove:
      - calamares
      - calamares-settings-debian
      - os-prober
