# Match the group membership the live session grants its user
# (iso/config/binary: user-default-groups=audio,video,input,render,netdev,bluetooth,sudo)
# so an installed account has the same device access as the live one.
---
defaultGroups:
  - audio
  - video
  - input
  - render
  - netdev
  - bluetooth
  - sudo

autologinGroup: autologin
doAutologin: false
sudoersGroup: sudo
setRootPassword: true
doReusePassword: true
passwordRequirements:
  minLength: 4
allowWeakPasswords: true
